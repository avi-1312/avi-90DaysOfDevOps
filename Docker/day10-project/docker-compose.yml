
version: '3'

services:
  web:
    build: .
    container_name: flask_app

  nginx:
    image: nginx
    container_name: nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

  db:
    image: postgres:14
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tstdb
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
